name: CI Backend

# Audit LOT 0 : barrière qualité automatique avant merge.
# Exécute typecheck + lint + tests sur chaque PR et push.

on:
  push:
    branches: [main, develop, 'remediation/**']
  pull_request:
    branches: [main, develop]

jobs:
  build-test:
    runs-on: ubuntu-latest

    # Service Postgres prêt pour les futurs tests d'intégration/e2e (LOT 8).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sacpromi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sacpromi_test?schema=public
      JWT_ACCESS_SECRET: ci_access_secret_change_me_0123456789abcdef
      JWT_REFRESH_SECRET: ci_refresh_secret_change_me_0123456789abcdef
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
